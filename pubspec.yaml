name: reliefnet
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  provider: ^6.1.2
  shared_preferences: ^2.3.3
  geolocator: ^14.0.2
  permission_handler: ^12.0.1
  cloud_firestore: ^6.2.0
  firebase_core: ^4.6.0
  firebase_storage: ^13.2.0
  firebase_auth: ^6.3.0
  image_picker: ^1.0.7
  url_launcher: 6.3.2
  google_sign_in: ^7.2.0
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  local_auth: ^3.0.1
  google_fonts: ^8.0.2
  intl: ^0.20.2
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
    - assets/images/google.png

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
