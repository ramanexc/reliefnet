name: reliefnet
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  provider: ^6.1.2
  shared_preferences: ^2.3.3
  geolocator: ^10.1.0
  geocoding: ^3.0.0
  permission_handler: ^11.3.0
  cloud_firestore: ^5.6.0
  firebase_core: ^3.10.0
  firebase_storage: ^12.4.0
  firebase_auth: ^5.4.0
  image_picker: ^1.0.7
  url_launcher: 6.3.2
  google_sign_in: ^6.2.1
  package_info_plus: ^8.0.0
  share_plus: ^7.2.1
  path: ^1.9.0
  file_picker: ^11.0.1
  google_generative_ai: ^0.4.6
  intl: ^0.20.2
  flutter_localizations:
    sdk: flutter

  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/logo.png
    - assets/images/google.png

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
